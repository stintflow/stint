# CNCF Serverless Workflow definition for the build-report flow (the portable contract).
# NOTE: the MVP engine executes the equivalent Java model in BuildReport.java. Parsing this YAML
# into that model is a planned increment — it does not change the wire contract or the topology.
document:
  dsl: '1.0.0'
  namespace: reports
  name: build-report
  version: '1.0.0'
do:
  - extractData:
      call: remote
      with:
        task: query-and-stage      # routing key -> CloudEvent subject -> selects the worker
        input:
          query: ${ .reportQuery }
      # output: { pointer: "s3://...", rows: N }

  - formatFile:
      call: remote
      with:
        task: format-file
        input:
          source: ${ .pointer }
          format: ${ .outputFormat }
      # output: { file: "s3://.../final.xlsx" }
