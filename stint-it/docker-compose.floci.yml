# Local AWS emulator for manual testing. Start with:  docker compose -f docker-compose.floci.yml up
# Then point connectors at it:  export AWS_ENDPOINT_URL=http://localhost:4566
services:
  floci:
    image: floci/floci:latest
    ports:
      - "4566:4566"
    environment:
      - AWS_DEFAULT_REGION=us-east-1
